name: Java PR Check

on:
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pontomed

    steps:
      - name: Baixando repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Upload do artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: ponto-med-jar-pr
          path: pontomed/target/*.jar
          retention-days: 3

  test:
    name: Testes Unitários
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pontomed

    steps:
      - name: Baixando repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Executar testes
        run: mvn test

      - name: Upload relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-pr
          path: pontomed/target/surefire-reports/
          retention-days: 3

  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    needs: [ build, test ]

    steps:
      - name: Pipeline aprovado — PR pode ser mergeado
        run: echo "✅ Build e testes passaram. PR aprovado para merge."