name: Java CI/CD

on:
  push:
    branches: [ "**" ]

jobs:

  build:
    name: Build (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pontomed

    strategy:
      matrix:
        java: [ 17, 21 ]

    steps:
      - name: Baixando repositório
        uses: actions/checkout@v4

      - name: Configurar Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Upload do artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: ponto-med-jar-java${{ matrix.java }}
          path: pontomed/target/*.jar
          retention-days: 7

  test:
    name: Testes (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pontomed

    strategy:
      matrix:
        java: [ 17, 21 ]

    steps:
      - name: Baixando repositório
        uses: actions/checkout@v4

      - name: Configurar Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Executar testes
        run: mvn test

      - name: Upload relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-java${{ matrix.java }}
          path: pontomed/target/surefire-reports/
          retention-days: 7

  # Só roda na main, e somente se build e test passarem em todas as versões
  docker:
    name: Publicar no Docker Hub
    runs-on: ubuntu-latest
    needs: [ build, test ]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Baixando repositório
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gerar e publicar imagem no Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./pontomed
          file: ./pontomed/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ponto-med:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ponto-med:${{ github.sha }}