name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pontomed

    strategy:
      matrix:
        # No PR usamos apenas a Java 21 para velocidade; no Push testamos ambas
        java: ${{ github.event_name == 'pull_request' && fromJSON('[21]') || fromJSON('[17, 21]') }}

    steps:
      - name: Baixando repositório
        uses: actions/checkout@v4

      - name: Configurar Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Executar testes
        run: mvn test

      - name: Upload do artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: ponto-med-jar-java${{ matrix.java }}-${{ github.event_name }}
          path: pontomed/target/*.jar
          retention-days: 7

      - name: Upload relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-pr
          path: pontomed/target/surefire-reports/
          retention-days: 3

  # Job como Status Check obrigatório no PR
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'pull_request'
    steps:
      - name: Check
        run: echo "✅ Build e testes passaram. PR aprovado para merge."

  # só roda na main e se a build e test passarem em todas as versões
  docker:
    name: Publicar no Docker Hub
    runs-on: ubuntu-latest
    needs: [ build-and-test ]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Baixando repositório
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gerar e publicar imagem no Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./pontomed
          file: ./pontomed/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ponto-med:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ponto-med:${{ github.sha }}