name: Java CI/CD

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build:
    name: Build, Test and Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pontomed

    steps:
      - name: Baixando repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Testes
        run: mvn test

      - name: Upload do artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: ponto-med-jar
          path: pontomed/target/*.jar
          retention-days: 7

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gerar e publicar imagem no Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./pontomed
          file: ./pontomed/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ponto-med:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ponto-med:${{ github.sha }}