name: CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

env:
  APP_DIR: pontomed            
  IMAGE_NAME: ponto-med        

jobs:

  build:
    name: "Build — Java ${{ matrix.java }}"
    runs-on: ubuntu-latest

    # matrix de versões
    strategy:
      matrix:
        java: [ 17, 21 ]

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: "⬇️ Checkout do repositório"
        uses: actions/checkout@v4

      - name: "Configurar Java ${{ matrix.java }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      # (simulação: DB_CONNECTION_STRING é um secret fictício)
      - name: " Verificar secret de conexão (sem expor o valor)"
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          if [ -z "$DB_CONNECTION_STRING" ]; then
            echo "  Secret DB_CONNECTION_STRING não configurado (aceitável em forks)."
          else
            echo "✅ Secret DB_CONNECTION_STRING presente."
          fi

      - name: " Build (sem testes)"
        run: mvn clean package -DskipTests

      - name: "Upload do artefato JAR"
        uses: actions/upload-artifact@v4
        with:
          name: "ponto-med-jar-java${{ matrix.java }}"
          path: ${{ env.APP_DIR }}/target/*.jar
          retention-days: 7

  test:
    name: "Testes — Java ${{ matrix.java }}"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ 17, 21 ]

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: " Checkout do repositório"
        uses: actions/checkout@v4

      - name: "Configurar Java ${{ matrix.java }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      # TAREFA 3 — executa os testes; pipeline falha se algum quebrar
      - name: "🧪 Executar testes unitários"
        run: mvn test

      # TAREFA 4 — upload do relatório de testes (sempre, mesmo se falhar)
      # Permite analisar quais testes quebraram diretamente na aba Actions.
      - name: "Upload do relatório de testes"
        uses: actions/upload-artifact@v4
        if: always()  
        with:
          name: "test-results-java${{ matrix.java }}"
          path: ${{ env.APP_DIR }}/target/surefire-reports/
          retention-days: 7



  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    needs: [ build, test ]   

    steps:
      - name: "✅ Quality Gate — build e testes aprovados"
        run: |
          echo "Build e testes passaram em todas as versões da matrix."
          echo "PR aprovado para merge na main."


  docker:
    name: " Publicar no Docker Hub"
    runs-on: ubuntu-latest
    needs: [ quality-gate ]  
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: " Checkout do repositório"
        uses: actions/checkout@v4

      - name: " Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: " Build e push da imagem"
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.APP_DIR }}
          file: ./${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
